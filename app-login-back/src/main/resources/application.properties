spring.application.name=app-login-back
spring.mvc.locale=es
server.port=8080
# DataSoure settings
#spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/bd_perro
#spring.datasource.url=jdbc:mysql://mysqldb:3306/bd_perro
spring.datasource.url=jdbc:postgresql://localhost:5432/db_login
#spring.datasource.username=root
spring.datasource.username=postgres
#spring.datasource.password=
spring.datasource.password=Postgre!
#spring.datasource.password=123456
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
#spring.h2.console.enabled=true
#spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
# Logging settings
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Configuration swagger
springdoc.swagger-ui.path=/swagger.html